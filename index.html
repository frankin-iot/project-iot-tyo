<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0f1e 0%, #03050b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(10, 20, 30, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 40px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        h1 {
            text-align: center;
            font-size: 2rem;
            color: #0ff;
            text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        .subtitle {
            text-align: center;
            color: #8aa;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .status-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .status-item {
            background: rgba(0,0,0,0.3);
            padding: 10px 25px;
            border-radius: 50px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            color: #fff;
            font-size: 0.9rem;
        }
        .status-item .led {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }
        .led.online { background: #0f0; box-shadow: 0 0 10px #0f0; }
        .led.offline { background: #f00; animation: none; }
        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        .sensor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }
        .sensor-card {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(0, 255, 255, 0.15);
            transition: 0.3s;
        }
        .sensor-card:hover { border-color: #0ff; box-shadow: 0 0 30px rgba(0,255,255,0.1); }
        .sensor-label {
            color: #8aa;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .sensor-value {
            font-size: 4rem;
            font-weight: 700;
            color: #fff;
            margin: 10px 0;
            text-shadow: 0 0 20px rgba(0,255,255,0.2);
        }
        .sensor-value.temp { color: #ff6b6b; text-shadow: 0 0 20px rgba(255,107,107,0.3); }
        .sensor-value.hum { color: #4dffb5; text-shadow: 0 0 20px rgba(77,255,181,0.3); }
        .sensor-unit { color: #8aa; font-size: 1rem; }
        .chart-container {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(0, 255, 255, 0.1);
            margin-bottom: 20px;
        }
        .chart-container h3 {
            color: #0ff;
            margin-bottom: 15px;
            font-weight: 400;
            letter-spacing: 1px;
            font-size: 1rem;
        }
        canvas {
            max-height: 250px;
            width: 100%;
        }
        .log-container {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(0, 255, 255, 0.1);
            max-height: 200px;
            overflow-y: auto;
        }
        .log-container h3 {
            color: #0ff;
            margin-bottom: 10px;
            font-weight: 400;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }
        .log-item {
            color: #8aa;
            font-size: 0.8rem;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-family: monospace;
        }
        .log-item .time { color: #0ff; }
        .log-item .temp-log { color: #ff6b6b; }
        .log-item .hum-log { color: #4dffb5; }
        footer {
            text-align: center;
            color: #445;
            font-size: 0.7rem;
            margin-top: 30px;
        }
        @media (max-width: 700px) {
            .sensor-value { font-size: 2.5rem; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🌡️ IoT MONITORING</h1>
    <div class="subtitle">Real-time | TYOHEBAT</div>

    <div class="status-row">
        <div class="status-item"><span class="led online" id="mqttLed"></span> MQTT: <span id="mqttStatus">Menghubungkan...</span></div>
        <div class="status-item"><span class="led offline" id="sensorLed"></span> Sensor: <span id="sensorStatus">Menunggu data...</span></div>
        <div class="status-item">📡 Data terakhir: <span id="lastUpdate">--:--:--</span></div>
    </div>

    <div class="sensor-grid">
        <div class="sensor-card">
            <div class="sensor-label">🌡️ Suhu</div>
            <div class="sensor-value temp" id="suhu">--</div>
            <div class="sensor-unit">°C</div>
        </div>
        <div class="sensor-card">
            <div class="sensor-label">💧 Kelembaban</div>
            <div class="sensor-value hum" id="kelembaban">--</div>
            <div class="sensor-unit">% RH</div>
        </div>
    </div>

    <div class="chart-container">
        <h3>📈 GRAFIK TREND (20 data terakhir)</h3>
        <canvas id="sensorChart"></canvas>
    </div>

    <div class="log-container" id="logContainer">
        <h3>📋 LOG</h3>
        <div id="logList"><div class="log-item">⏳ Menunggu data...</div></div>
    </div>

    <footer>⚡ Tyo Hebat | MQTT over WebSocket</footer>
</div>

<script>
    const MQTT_BROKER = "wss://sensor.tyoprakusudewo.bond/mqtt";
    const MQTT_TOPIC = "sensor/suhu";
    let chart, historyData = [];
    const MAX_HISTORY = 20;

    const ctx = document.getElementById('sensorChart').getContext('2d');
    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [
                { label: 'Suhu (°C)', data: [], borderColor: '#ff6b6b', backgroundColor: 'rgba(255,107,107,0.1)', fill: true, tension: 0.2, pointRadius: 3 },
                { label: 'Kelembaban (%)', data: [], borderColor: '#4dffb5', backgroundColor: 'rgba(77,255,181,0.05)', fill: true, tension: 0.2, pointRadius: 3 }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8aa' } }, x: { ticks: { color: '#8aa', maxTicksLimit: 10 } } },
            plugins: { legend: { labels: { color: '#8aa' } } }
        }
    });

    function updateChart() {
        const rev = [...historyData].reverse();
        chart.data.labels = rev.map(i => i.time);
        chart.data.datasets[0].data = rev.map(i => i.temp);
        chart.data.datasets[1].data = rev.map(i => i.hum);
        chart.update();
    }

    function addLog(msg, type = 'info') {
        const logList = document.getElementById('logList');
        const item = document.createElement('div');
        item.className = 'log-item';
        const time = new Date().toLocaleTimeString();
        item.innerHTML = `<span class="time">[${time}]</span> ${msg}`;
        logList.prepend(item);
        if (logList.children.length > 50) logList.removeChild(logList.lastChild);
    }

    const client = mqtt.connect(MQTT_BROKER);
    client.on('connect', () => {
        document.getElementById('mqttStatus').innerHTML = 'Online';
        document.getElementById('mqttLed').className = 'led online';
        addLog('✅ MQTT Terhubung');
        client.subscribe(MQTT_TOPIC);
    });
    client.on('error', (err) => {
        document.getElementById('mqttStatus').innerHTML = 'Error';
        document.getElementById('mqttLed').className = 'led offline';
        addLog('❌ MQTT Error: ' + err.message);
    });
    client.on('message', (topic, message) => {
        try {
            const data = JSON.parse(message.toString());
            document.getElementById('suhu').innerHTML = data.suhu;
            document.getElementById('kelembaban').innerHTML = data.kelembaban;
            document.getElementById('sensorLed').className = 'led online';
            document.getElementById('sensorStatus').innerHTML = 'Online';
            document.getElementById('lastUpdate').innerHTML = new Date().toLocaleTimeString();

            const time = new Date().toLocaleTimeString();
            historyData.unshift({ temp: data.suhu, hum: data.kelembaban, time: time });
            if (historyData.length > MAX_HISTORY) historyData.pop();
            updateChart();
            addLog(`📥 Suhu: <span class="temp-log">${data.suhu}°C</span> | Kelembaban: <span class="hum-log">${data.kelembaban}%</span>`);
        } catch(e) {
            addLog('❌ Error parsing data: ' + e.message);
        }
    });

    setInterval(() => {
        const last = document.getElementById('lastUpdate').innerHTML;
        if (last === '--:--:--') return;
        const now = Date.now();
        const lastTime = new Date('1970-01-01T' + last).getTime();
        if (now - lastTime > 10000) {
            document.getElementById('sensorLed').className = 'led offline';
            document.getElementById('sensorStatus').innerHTML = 'Offline (timeout)';
        }
    }, 2000);
</script>

</body>
</html>
